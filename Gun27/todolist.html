<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapılacaklar Listesi</title>
</head>

<body>
    <h1>Yapılacaklar Listesi</h1>

    <form action="#" id="frmTodo">
        <input type="text" id="title" required>
        <button>Ekle</button>
    </form>

    <div id="todos"></div>

    <script>
        let todos = [];
        //loadSampleData();
        loadData();

        const divTodos = document.getElementById("todos");
        const frmTodo = document.getElementById("frmTodo");
        const inputTitle = document.getElementById("title");

        function loadSampleData() {
            todos.push({
                    title: "Kahvaltı hazırla",
                    done: false
                },
                {
                    title: "Spor yap",
                    done: false
                },
                {
                    title: "Yüzünü yıka",
                    done: true
                },
                {
                    title: "Ütü yap",
                    done: true
                });
        }

        function listTodos() {
            divTodos.innerHTML = ""; // içini temizle
            sortTodos();
            saveData();

            for (const todo of todos) {
                const div = document.createElement("div");
                const label = document.createElement("label");
                const input = document.createElement("input");
                input.type = "checkbox";
                input.checked = todo.done;
                input.addEventListener("change", function () {
                    todo.done = input.checked;
                    listTodos();
                });
                const text = document.createTextNode(todo.title);
                const btnDelete = document.createElement("button");
                btnDelete.innerHTML = "&times;";
                btnDelete.addEventListener("click", function () {
                    deleteTodo(todo);
                    listTodos();
                });
                label.append(input, text);
                div.append(label, btnDelete);
                divTodos.append(div);
            }
        }

        function deleteTodo(todo) {
            const index = todos.indexOf(todo);
            todos.splice(index, 1);
        }

        // todo'larımızı yapılma durumuna göre sıralar
        function sortTodos() {
            todos.sort((a, b) => a.done - b.done);
        }

        function saveData() {
            localStorage["todos"] = JSON.stringify(todos);
        }

        function loadData() {
            if (localStorage["todos"]) {
                const json = localStorage["todos"];
                todos = JSON.parse(json);
            }
        }

        frmTodo.addEventListener("submit", function (event) {
            event.preventDefault();
            const newTodo = {
                title: inputTitle.value,
                done: false
            };
            todos.push(newTodo);
            inputTitle.value = "";
            listTodos();
        });

        listTodos();
    </script>
</body>

</html>
